<!DOCTYPE html>
<html>
<head>
  <title>Report a Trail Issue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h2>REPORT A TRAIL ISSUE</h2>

<label for="siteSelect">Site</label>
<select id="siteSelect"></select>

<div id="map"></div>

<label for="issueType">Issue Type</label>
<select id="issueType">
  <option value="Erosion">Erosion</option>
  <option value="Blowdown">Blowdown / Fallen Tree</option>
  <option value="Invasives">Invasive Plants</option>
  <option value="Drainage">Drainage / Water</option>
  <option value="Safety">Safety Hazard</option>
  <option value="Other">Other</option>
</select>

<label for="severity">Severity</label>
<select id="severity">
  <option value="Low">Low</option>
  <option value="Medium">Medium</option>
  <option value="High">High</option>
</select>

<label for="description">Description (optional)</label>
<textarea id="description" rows="3"></textarea>

<button onclick="submitIssue()">SUBMIT ISSUE</button>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Site configuration -->
<script src="sites.js"></script>

<script>
let map;
let marker = null;

const POWER_AUTOMATE_URL = "https://default912a785a67cc420da3dce817f6ff7b.fc.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/7823418fc89b4417928398e5c3fee82b/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=GEAypdes3LSTSZEm39ASOMtQH1isZ3x95j-_fppaBcc";

async function sendToPowerAutomate(data) {
  console.log("sendToPowerAutomate() called", data);

  try {
    const response = await fetch(POWER_AUTOMATE_URL, {
      method: "POST",
      mode: "cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!response.ok) {
      throw new Error("Submission failed");
    }

    alert("Issue submitted successfully!");
  } catch (err) {
    console.error("Power Automate error:", err);
    alert("Error submitting issue.");
  }
}


const intakeMode = "console";

const siteSelect = document.getElementById("siteSelect");

// Populate site dropdown
Object.keys(sites).forEach(site => {
  const opt = document.createElement("option");
  opt.value = site;
  opt.textContent = site;
  siteSelect.appendChild(opt);
});
siteSelect.selectedIndex = 0;


// Initialize map
let boundaryLayer = null;
let boundaryShadowLayer = null;

async function applySiteBoundary(site) {
  // Remove existing layers
  if (boundaryLayer) {
    map.removeLayer(boundaryLayer);
    boundaryLayer = null;
  }
  if (boundaryShadowLayer) {
    map.removeLayer(boundaryShadowLayer);
    boundaryShadowLayer = null;
  }

  if (!site || !site.boundary) return;

  try {
    const response = await fetch(site.boundary);
    const geojson = await response.json();

    // 🟢 Shadow / glow layer (drawn first, underneath)
    boundaryShadowLayer = L.geoJSON(geojson, {
      style: {
        color: "#C4D600",   // light green glow
        weight: 8,          // thicker than main boundary
        opacity: 0.6,
        fillOpacity: 0
      }
    }).addTo(map);

    // 🟢 Main boundary (drawn on top)
    boundaryLayer = L.geoJSON(geojson, {
      style: {
        color: "#569602",   // main boundary color
        weight: 3,
        fillOpacity: 0.1
      }
    }).addTo(map);

    map.fitBounds(boundaryLayer.getBounds());

  } catch (err) {
    console.error("Failed to load boundary:", err);
  }
}

// Initialize map
const firstSite = sites[siteSelect.value];

map = L.map('map').setView(firstSite.center, firstSite.zoom);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

applySiteBoundary(firstSite);
// Handle map clicks
map.on('click', function(e) {
  if (marker) {
    map.removeLayer(marker);
  }
  marker = L.marker(e.latlng).addTo(map);
});

// Change site → recenter map
siteSelect.addEventListener('change', () => {
  const site = sites[siteSelect.value];
  map.setView(site.center, site.zoom);
  applySiteBoundary(site);
  if (marker) {
    map.removeLayer(marker);
    marker = null;
  }
});

function submitIssue() {
  console.log("submitIssue() called");

  if (!marker) {
    alert("Please tap the map to mark the issue location.");
    return;
  }

  const payload = {
    site: siteSelect.value,
    issueType: document.getElementById("issueType").value,
    severity: document.getElementById("severity").value,
    latitude: marker.getLatLng().lat,
    longitude: marker.getLatLng().lng,
    description: document.getElementById("description").value,
    submittedAt: new Date().toISOString()
  };

  console.log("Payload:", payload);

  sendToPowerAutomate(payload);
}


</script>

</body>
</html>
